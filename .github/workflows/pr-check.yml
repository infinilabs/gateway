name: PR-Check

on:
    pull_request:
        branches: [ "main" ]

defaults:
  run:
    shell: bash

env:
    PNAME: gateway

jobs:
    format_check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout current repository
              uses: actions/checkout@v4
              with:
                path: ${{ env.PNAME }}
                fetch-depth: 0

            - name: Checkout framework repository
              uses: actions/checkout@v4
              with:
                repository: infinilabs/framework
                path: framework

            - name: Prepare framework build info
              run: |
                make -C "$GITHUB_WORKSPACE/framework" \
                  FRAMEWORK_FOLDER="$GITHUB_WORKSPACE/framework" \
                  OFFLINE_BUILD=true \
                  init update-generated-framework-info

            - name: Set up go toolchain
              uses: actions/setup-go@v5
              with:
                go-version-file: gateway/go.mod
                check-latest: false
                cache: true
                cache-dependency-path: |
                  gateway/go.sum
                  framework/go.sum

            - name: Check go toolchain
              run: go version
              
            - name: Code format
              shell: bash
              run: |
                cd $GITHUB_WORKSPACE/$PNAME
                echo Formating code at $PWD ...
                find . -type f -name '*.go' \
                  -not -path './vendor/*' \
                  -not -path './.git/*' \
                  -exec gofmt -w {} +

            - name: Check for changes after format
              id: check-changes
              shell: bash
              run: |
                cd $GITHUB_WORKSPACE/$PNAME
                if [[ $(git status --porcelain | grep -c " M .*\.go$") -gt 0 ]]; then
                  echo "go format detected formatting changes"
                  echo "changes=true" >> $GITHUB_OUTPUT
                else
                  echo "go format no changes found"
                  echo "changes=false" >> $GITHUB_OUTPUT
                fi
            
            - name: Fail workflow if changes after format
              if: steps.check-changes.outputs.changes == 'true'
              run: |
                cd $GITHUB_WORKSPACE/$PNAME && echo
                git status --porcelain | grep " M .*\.go$"
                echo "----------------------------------------------------------------------------------"
                echo "IMPORTANT: Above files are not formatted, please run 'make format' to format them."
                echo "----------------------------------------------------------------------------------"
                exit 1

    unit_test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout current repository
              uses: actions/checkout@v4
              with:
                path: ${{ env.PNAME }}
                fetch-depth: 0

            - name: Checkout framework repository
              uses: actions/checkout@v4
              with:
                repository: infinilabs/framework
                path: framework

            - name: Prepare framework build info
              run: |
                make -C "$GITHUB_WORKSPACE/framework" \
                  FRAMEWORK_FOLDER="$GITHUB_WORKSPACE/framework" \
                  OFFLINE_BUILD=true \
                  init update-generated-framework-info

            - name: Set up go toolchain
              uses: actions/setup-go@v5
              with:
                go-version-file: gateway/go.mod
                check-latest: false
                cache: true
                cache-dependency-path: |
                  gateway/go.sum
                  framework/go.sum

            - name: Check go toolchain
              run: go version

            - name: Unit test
              env:
                GOFLAGS: -tags=ci
              run: |
                cd $GITHUB_WORKSPACE/$PNAME
                echo Testing code at $PWD ...
                go test ./...
    
    code_lint:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout current repository
              uses: actions/checkout@v4
              with:
                path: ${{ env.PNAME }}
                fetch-depth: 0

            - name: Checkout framework repository
              uses: actions/checkout@v4
              with:
                repository: infinilabs/framework
                path: framework

            - name: Prepare framework build info
              run: |
                make -C "$GITHUB_WORKSPACE/framework" \
                  FRAMEWORK_FOLDER="$GITHUB_WORKSPACE/framework" \
                  OFFLINE_BUILD=true \
                  init update-generated-framework-info

            - name: Set up go toolchain
              uses: actions/setup-go@v5
              with:
                go-version-file: gateway/go.mod
                check-latest: false
                cache: true
                cache-dependency-path: |
                  gateway/go.sum
                  framework/go.sum

            - name: Check go toolchain
              run: go version

            - name: Code lint
              env:
                GOFLAGS: -tags=ci
              run: |
                if ! command -v golangci-lint >/dev/null 2>&1; then
                  echo "Installing golangci-lint..."
                  GOBIN=$(go env GOPATH)/bin go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
                fi
                cd $GITHUB_WORKSPACE/$PNAME
                echo Linting code at $PWD ...
                golangci-lint run --new-from-rev="${{ github.event.pull_request.base.sha }}"